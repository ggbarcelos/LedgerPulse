services:
  postgres:
    image: postgres:17-alpine
    container_name: ledgerpulse-postgres
    environment:
      POSTGRES_DB: ledgerpulse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ledgerpulse"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: src/LedgerPulse.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ledgerpulse;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: src/LedgerPulse.ConsolidationWorker/Dockerfile
    environment:
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=ledgerpulse;Username=postgres;Password=postgres
      ConsolidationWorker__PollingIntervalSeconds: 5
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/LedgerPulse.Frontend/Dockerfile
    depends_on:
      - api
    ports:
      - "8082:80"

volumes:
  postgres-data:
